name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Unit tests
        run: swift test --filter SimingCoreTests

      - name: Start PostgreSQL
        run: |
          brew services start postgresql@14
          sleep 5
          psql -d postgres -c "CREATE ROLE siming WITH LOGIN PASSWORD 'siming' CREATEDB;" || true
          psql -d postgres -c "CREATE DATABASE siming OWNER siming;" || true

      - name: Integration tests
        env:
          PGHOST: localhost
          PGUSER: siming
          PGPASSWORD: siming
          PGDATABASE: siming
          MIGRATIONS_PATH: migrations
        run: swift test --filter SimingIntegrationTests
