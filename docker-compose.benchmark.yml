# Extends docker-compose.yml for benchmark runs.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.benchmark.yml up -d
#
# Brings up:
#   - siming-db   (port 5432) — Siming's PostgreSQL
#   - hapi-db     (port 5433) — HAPI's PostgreSQL
#   - hapi        (port 8081) — HAPI FHIR R4 server
#
# Siming itself runs as a native binary on port 8080 (see benchmarks/bench.sh).
# HAPI uses PostgreSQL for storage parity with Siming.

services:
  hapi-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: hapi
      POSTGRES_DB: hapi
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  hapi:
    image: hapiproject/hapi:v7.4.0
    ports:
      - "8081:8080"
    depends_on:
      hapi-db:
        condition: service_healthy
    environment:
      - spring.datasource.url=jdbc:postgresql://hapi-db:5432/hapi
      - spring.datasource.username=hapi
      - spring.datasource.password=hapi
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
      - spring.jpa.hibernate.ddl-auto=update
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.default_encoding=JSON
      - hapi.fhir.allow_external_references=false
      - hapi.fhir.subscription.resthook_enabled=false
      - hapi.fhir.subscription.websocket_enabled=false
      - hapi.fhir.validation.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/fhir/metadata > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
