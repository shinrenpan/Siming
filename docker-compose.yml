services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siming
      POSTGRES_PASSWORD: siming
      POSTGRES_DB: siming
    ports:
      - "5432:5432"
    volumes:
      - siming_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siming"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://siming:siming@db:5432/siming
    depends_on:
      db:
        condition: service_healthy

volumes:
  siming_pgdata:
