services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siming
      POSTGRES_PASSWORD: siming
      POSTGRES_DB: siming
    ports:
      - "5432:5432"
    volumes:
      - siming_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siming"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  siming_pgdata:
